# fly.toml app configuration file generated for budgetwise on 2025-12-13T21:25:58-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'budgetwise'
primary_region = 'sjc'

[build]

[[mounts]]
  source = 'budgetwise_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
