name: Fly Deploy

# Auto-deploy to Fly.io on every push to master.
on:
  push:
    branches:
      - master
  workflow_dispatch:   # allows manual runs from the Actions tab

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    # Prevent overlapping deploys from racing each other.
    concurrency:
      group: deploy-budgetwise
      cancel-in-progress: true
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # fly.toml and the Dockerfile live in the project subfolder, not the repo root.
      - name: Deploy
        working-directory: ./BudgetWise
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
